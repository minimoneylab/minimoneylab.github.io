<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Brief - MiniMoneyLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #FAFAF5; /* Your perfect gray! */
            color: #2B2B2B;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Layout */
        .page-wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar - Now with gray background */
        .sidebar {
            width: 240px;
            background: #FAFAF5; /* Same as body */
            border-right: 1px solid #E5E5E5;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 32px 24px 24px;
            border-bottom: 1px solid #E8E8E8;
        }
        
        .sidebar-logo {
            font-size: 1.125rem;
            font-weight: 600;
            color: #2B2B2B;
        }
        
        .sidebar-tagline {
            font-size: 0.8125rem;
            color: #9B9B9B;
            margin-top: 4px;
        }
        
        .country-nav { padding: 24px 0; }
        
        .country-nav-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #9B9B9B;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 24px 12px;
        }
        
        .country-button {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 24px;
            background: none;
            border: none;
            border-left: 3px solid transparent;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.9375rem;
            color: #4A4A4A;
        }
        
        .country-button:hover { 
            background: rgba(0,0,0,0.03); 
        }
        
        .country-button.active {
            background: rgba(0,0,0,0.05);
            border-left-color: #2B2B2B;
            color: #2B2B2B;
            font-weight: 500;
        }
        
        .country-flag { 
            font-size: 1.25rem;
            line-height: 1;
        }
        
        .country-name { flex: 1; }
        
        .country-badge {
            font-size: 0.6875rem;
            color: #9B9B9B;
            background: rgba(0,0,0,0.06);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 240px; }
        
        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #E5E5E5;
        }
        
        .header-illustration {
            max-width: 480px; /* 60% of 800px */
            margin: 0 auto;
            padding: 40px 40px 30px; /* Reduced padding */
        }
        
        .header-illustration img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .header-content {
            text-align: center;
            padding: 20px 40px 40px; /* Reduced top padding */
        }
        
        .main-title {
            font-size: 2.5rem;
            font-weight: 400;
            color: #2B2B2B;
            margin-bottom: 16px;
        }
        
        .date {
            font-size: 0.9375rem;
            color: #6B6B6B;
        }
        
        /* Stats */
        .stats {
            background: white;
            border-bottom: 1px solid #E5E5E5;
            padding: 40px;
        }
        
        .stats-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }
        
        .stat-item { text-align: center; }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 300;
            color: #2B2B2B;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 0.8125rem;
            color: #9B9B9B;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        /* Archive Nav */
        .archive-nav {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 40px;
        }
        
        .archive-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #E5E5E5;
        }
        
        .archive-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #6B6B6B;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        .archive-dates {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .date-button {
            padding: 8px 16px;
            background: #F5F5F5;
            border-radius: 6px;
            border: none;
            color: #2B2B2B;
            font-size: 0.875rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        
        .date-button:hover { background: #E5E5E5; }
        .date-button.active { background: #2B2B2B; color: white; }
        
        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }
        
        /* Sections */
        .section {
            background: white;
            border-radius: 12px;
            padding: 48px;
            margin-bottom: 24px;
            border: 1px solid #E5E5E5;
        }
        
        .section-header {
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .section-title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .priority-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .priority-indicator.high { background: #2B2B2B; }
        .priority-indicator.medium { background: #9B9B9B; }
        .priority-indicator.low { background: #D4D4D4; }
        
        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #6B6B6B;
            text-transform: uppercase;
        }
        
        /* Articles */
        .article {
            padding-bottom: 40px;
            margin-bottom: 40px;
            border-bottom: 1px solid #F5F5F5;
        }
        
        .article:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .article-title {
            font-size: 1.5rem;
            font-weight: 500;
            color: #2B2B2B;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        
        .article-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            font-size: 0.8125rem;
            color: #9B9B9B;
        }
        
        .article-summary {
            font-size: 1rem;
            line-height: 1.7;
            color: #4A4A4A;
            margin-bottom: 24px;
        }
        
        .article-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2B2B2B;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 10px 20px;
            border: 1px solid #E5E5E5;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .article-link:hover {
            background: #FAFAFA;
            border-color: #D4D4D4;
        }
        
        /* Under Construction */
        .under-construction {
            text-align: center;
            padding: 100px 40px;
        }
        
        .construction-icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        
        .construction-title {
            font-size: 1.5rem;
            font-weight: 500;
            color: #2B2B2B;
            margin-bottom: 12px;
        }
        
        .construction-text {
            font-size: 1rem;
            color: #9B9B9B;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #9B9B9B;
        }
        
        /* Footer */
        .footer {
            background: white;
            border-top: 1px solid #E5E5E5;
            padding: 48px 40px;
            text-align: center;
        }
        
        .footer-text {
            font-size: 0.875rem;
            color: #9B9B9B;
        }
        
        .footer-brand {
            font-weight: 500;
            color: #6B6B6B;
        }
        
        .update-time {
            font-size: 0.8125rem;
            color: #C4C4C4;
            margin-top: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .header-illustration { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">MiniMoneyLab</div>
                <div class="sidebar-tagline">Financial Intelligence</div>
            </div>
            
            <div class="country-nav">
                <div class="country-nav-title">Regions</div>
                
                <button class="country-button active" onclick="switchCountry('taiwan')">
                    <span class="country-flag">🇹🇼</span>
                    <span class="country-name">Taiwan</span>
                </button>
                
                <button class="country-button" onclick="switchCountry('korea')">
                    <span class="country-flag">🇰🇷</span>
                    <span class="country-name">Korea</span>
                    <span class="country-badge">Soon</span>
                </button>
                
                <button class="country-button" onclick="switchCountry('philippines')">
                    <span class="country-flag">🇵🇭</span>
                    <span class="country-name">Philippines</span>
                    <span class="country-badge">Soon</span>
                </button>
                
                <button class="country-button" onclick="switchCountry('indonesia')">
                    <span class="country-flag">🇮🇩</span>
                    <span class="country-name">Indonesia</span>
                    <span class="country-badge">Soon</span>
                </button>
                
                <button class="country-button" onclick="switchCountry('india')">
                    <span class="country-flag">🇮🇳</span>
                    <span class="country-name">India</span>
                    <span class="country-badge">Soon</span>
                </button>
                
                <button class="country-button" onclick="switchCountry('malaysia')">
                    <span class="country-flag">🇲🇾</span>
                    <span class="country-name">Malaysia</span>
                    <span class="country-badge">Soon</span>
                </button>
                
                <button class="country-button" onclick="switchCountry('vietnam')">
                    <span class="country-flag">🇻🇳</span>
                    <span class="country-name">Vietnam</span>
                    <span class="country-badge">Soon</span>
                </button>
            </div>
        </nav>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Taiwan Content -->
            <div id="taiwan-content">
                <div id="loading" class="loading">
                    <div style="font-size: 2rem; margin-bottom: 16px;">📰</div>
                    <div>Loading briefing...</div>
                </div>

                <div id="main-content" style="display: none;">
                    <div class="header">
                        <div class="header-illustration">
                            <img id="country-illustration" src="taiwan.jpg" alt="Country Illustration">
                        </div>
                        <div class="header-content">
                            <h1 class="main-title">Daily Brief</h1>
                            <div id="current-date" class="date"></div>
                        </div>
                    </div>
                    
                    <div class="stats">
                        <div class="stats-inner">
                            <div class="stat-item">
                                <div id="stat-total" class="stat-number">0</div>
                                <div class="stat-label">Articles</div>
                            </div>
                            <div class="stat-item">
                                <div id="stat-high" class="stat-number">0</div>
                                <div class="stat-label">High</div>
                            </div>
                            <div class="stat-item">
                                <div id="stat-medium" class="stat-number">0</div>
                                <div class="stat-label">Medium</div>
                            </div>
                            <div class="stat-item">
                                <div id="stat-low" class="stat-number">0</div>
                                <div class="stat-label">Low</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="archive-nav">
                        <div class="archive-box">
                            <div class="archive-title">📅 Past Briefings</div>
                            <div id="archive-dates" class="archive-dates"></div>
                        </div>
                    </div>
                    
                    <div class="container">
                        <div id="content-sections"></div>
                    </div>
                    
                    <div class="footer">
                        <div class="footer-text">
                            <span class="footer-brand">MiniMoneyLab</span><br>
                            Financial Intelligence
                        </div>
                        <div id="update-time" class="update-time"></div>
                    </div>
                </div>
            </div>
            
            <!-- Other Countries -->
            <div id="other-content" style="display: none;">
                <div class="header">
                    <div class="header-illustration">
                        <img id="country-illustration-other" src="korea.png" alt="Country Illustration">
                    </div>
                    <div class="header-content">
                        <h1 class="main-title">Daily Brief</h1>
                    </div>
                </div>
                <div class="under-construction">
                    <div class="construction-icon">🚧</div>
                    <h2 class="construction-title">Under Construction</h2>
                    <p class="construction-text">This region's briefing is coming soon!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date().toISOString().split('T')[0];
        let currentCountry = 'taiwan';
        
        function switchCountry(country) {
            currentCountry = country;
            
            // Update active button
            document.querySelectorAll('.country-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.country-button').classList.add('active');
            
            // Change header illustration based on country
            const headerImg = document.getElementById('country-illustration');
            const headerImgOther = document.getElementById('country-illustration-other');
            const imageFiles = {
                'taiwan': 'taiwan.jpg',
                'korea': 'korea.png',
                'philippines': 'philippines.png',
                'indonesia': 'indonesia.png',
                'india': 'india.png',
                'malaysia': 'malaysia.png',
                'vietnam': 'vietnam.png'
            };
            
            // Update both images
            if (headerImg && imageFiles[country]) {
                headerImg.src = imageFiles[country];
                headerImg.alt = country.charAt(0).toUpperCase() + country.slice(1) + ' Illustration';
            }
            if (headerImgOther && imageFiles[country]) {
                headerImgOther.src = imageFiles[country];
                headerImgOther.alt = country.charAt(0).toUpperCase() + country.slice(1) + ' Illustration';
            }
            
            // Show/hide content
            if (country === 'taiwan') {
                document.getElementById('taiwan-content').style.display = 'block';
                document.getElementById('other-content').style.display = 'none';
            } else {
                document.getElementById('taiwan-content').style.display = 'none';
                document.getElementById('other-content').style.display = 'block';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadAvailableDates();
            loadData(currentDate);
        });
        
        function loadAvailableDates() {
            const archiveContainer = document.getElementById('archive-dates');
            const dates = [];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                dates.push(date.toISOString().split('T')[0]);
            }
            
            dates.forEach(dateStr => {
                const button = document.createElement('button');
                button.className = 'date-button';
                if (dateStr === currentDate) button.classList.add('active');
                
                const date = new Date(dateStr);
                button.textContent = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                button.onclick = () => loadData(dateStr);
                
                archiveContainer.appendChild(button);
            });
        }
        
        async function loadData(dateStr) {
            try {
                const response = await fetch(`data/${dateStr}.json`);
                if (!response.ok) throw new Error('Not found');
                
                const data = await response.json();
                renderData(data, dateStr);
                
                // Update active button
                document.querySelectorAll('.date-button').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.date-button').forEach(btn => {
                    const btnDate = new Date(btn.textContent + ' ' + new Date().getFullYear());
                    const checkDate = new Date(dateStr);
                    if (btnDate.getMonth() === checkDate.getMonth() && btnDate.getDate() === checkDate.getDate()) {
                        btn.classList.add('active');
                    }
                });
                currentDate = dateStr;
                
            } catch (error) {
                console.log('No data for ' + dateStr);
                
                // Show page structure but clear content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                
                const date = new Date(dateStr);
                const formattedDate = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                
                // Update date display
                document.getElementById('current-date').textContent = formattedDate;
                
                // Clear stats
                document.getElementById('stat-total').textContent = '0';
                document.getElementById('stat-high').textContent = '0';
                document.getElementById('stat-medium').textContent = '0';
                document.getElementById('stat-low').textContent = '0';
                
                // Show "no data" message in content area
                const container = document.getElementById('content-sections');
                container.innerHTML = `
                    <div style="text-align: center; padding: 100px 40px; color: #9B9B9B;">
                        <div style="font-size: 3rem; margin-bottom: 24px;">📭</div>
                        <div style="font-size: 1.25rem; color: #6B6B6B; margin-bottom: 12px;">No briefing available</div>
                        <div style="font-size: 0.9375rem;">No news data for this date</div>
                    </div>
                `;
                
                // Clear update time
                document.getElementById('update-time').textContent = '';
                
                // Update active button
                document.querySelectorAll('.date-button').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.date-button').forEach(btn => {
                    const btnDate = new Date(btn.textContent + ' ' + new Date().getFullYear());
                    const checkDate = new Date(dateStr);
                    if (btnDate.getMonth() === checkDate.getMonth() && btnDate.getDate() === checkDate.getDate()) {
                        btn.classList.add('active');
                    }
                });
            }
        }
        
        function renderData(data, dateStr) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            const date = new Date(dateStr);
            document.getElementById('current-date').textContent = 
                date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            document.getElementById('stat-total').textContent = data.total_articles || 0;
            document.getElementById('stat-high').textContent = data.high?.length || 0;
            document.getElementById('stat-medium').textContent = data.medium?.length || 0;
            document.getElementById('stat-low').textContent = data.not_relevant?.length || 0;
            
            const container = document.getElementById('content-sections');
            container.innerHTML = '';
            
            if (data.high && data.high.length > 0) {
                container.innerHTML += renderSection('High Priority', 'high', data.high);
            }
            
            if (data.medium && data.medium.length > 0) {
                container.innerHTML += renderSection('Medium Priority', 'medium', data.medium);
            }
            
            document.getElementById('update-time').textContent = 'Last updated ' + (data.update_time || dateStr);
        }
        
        function renderSection(title, priority, articles) {
            let html = `<div class="section"><div class="section-header">
                <div class="section-title-wrapper">
                    <div class="priority-indicator ${priority}"></div>
                    <h2 class="section-title">${title}</h2>
                </div></div>`;
            
            articles.forEach(article => {
                html += `<article class="article">
                    <h3 class="article-title">${article.title}</h3>
                    <div class="article-meta">
                        <span>📂 ${article.section}</span>
                        <span>📅 ${article.date}</span>
                    </div>
                    <div class="article-summary">${article.summary}</div>
                    <a href="${article.url}" class="article-link" target="_blank">Read Article →</a>
                </article>`;
            });
            
            return html + '</div>';
        }
    </script>
</body>
</html>
