<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Brief - MiniMoneyLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: #2B2B2B;
            background: #F5F5F5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Loading state */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #9B9B9B;
        }
        
        /* Header */
        .header {
            background: white;
            padding: 0;
            border-bottom: 1px solid #E5E5E5;
        }
        
        .header-illustration {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: block;
            padding: 60px 40px 40px;
        }
        
        .header-illustration img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .header-content {
            text-align: center;
            padding: 30px 40px 50px;
        }
        
        .site-title {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: #9B9B9B;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .main-title {
            font-size: 2.5rem;
            font-weight: 400;
            color: #2B2B2B;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        
        .date {
            font-size: 0.9375rem;
            color: #6B6B6B;
            font-weight: 400;
        }
        
        /* Stats */
        .stats {
            background: white;
            border-bottom: 1px solid #E5E5E5;
            padding: 40px;
        }
        
        .stats-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 300;
            color: #2B2B2B;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 0.8125rem;
            color: #9B9B9B;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        /* Archive Navigation */
        .archive-nav {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 40px;
        }
        
        .archive-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #E5E5E5;
        }
        
        .archive-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #6B6B6B;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        .archive-dates {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .date-button {
            display: inline-block;
            padding: 8px 16px;
            background: #F5F5F5;
            border-radius: 6px;
            text-decoration: none;
            color: #2B2B2B;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            font-family: inherit;
        }
        
        .date-button:hover {
            background: #E5E5E5;
        }
        
        .date-button.active {
            background: #2B2B2B;
            color: white;
        }
        
        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }
        
        /* Sections */
        .section {
            background: white;
            border-radius: 12px;
            padding: 48px;
            margin-bottom: 24px;
            border: 1px solid #E5E5E5;
        }
        
        .section-header {
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .section-title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .priority-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .priority-indicator.high { background: #2B2B2B; }
        .priority-indicator.medium { background: #9B9B9B; }
        .priority-indicator.low { background: #D4D4D4; }
        
        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #6B6B6B;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        /* Articles */
        .article {
            padding-bottom: 40px;
            margin-bottom: 40px;
            border-bottom: 1px solid #F5F5F5;
        }
        
        .article:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .article-title {
            font-size: 1.5rem;
            font-weight: 500;
            color: #2B2B2B;
            margin-bottom: 16px;
            line-height: 1.4;
            letter-spacing: -0.01em;
        }
        
        .article-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            font-size: 0.8125rem;
            color: #9B9B9B;
        }
        
        .article-summary {
            font-size: 1rem;
            line-height: 1.7;
            color: #4A4A4A;
            margin-bottom: 24px;
            font-weight: 400;
        }
        
        .article-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2B2B2B;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 10px 20px;
            border: 1px solid #E5E5E5;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        
        .article-link:hover {
            background: #FAFAFA;
            border-color: #D4D4D4;
        }
        
        /* Not Relevant */
        .not-relevant-list {
            list-style: none;
            padding: 0;
        }
        
        .not-relevant-list li {
            padding: 14px 0;
            border-bottom: 1px solid #F5F5F5;
            color: #9B9B9B;
            font-size: 0.9375rem;
        }
        
        .not-relevant-list li:last-child {
            border-bottom: none;
        }
        
        /* Footer */
        .footer {
            background: white;
            border-top: 1px solid #E5E5E5;
            padding: 48px 40px;
            text-align: center;
        }
        
        .footer-text {
            font-size: 0.875rem;
            color: #9B9B9B;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .footer-brand {
            font-weight: 500;
            color: #6B6B6B;
        }
        
        .update-time {
            font-size: 0.8125rem;
            color: #C4C4C4;
            margin-top: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-illustration { padding: 40px 20px 20px; }
            .header-content { padding: 20px 20px 40px; }
            .main-title { font-size: 2rem; }
            .stats { padding: 30px 20px; }
            .stats-inner { grid-template-columns: repeat(2, 1fr); gap: 24px; }
            .container { padding: 0 20px 60px; }
            .section { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <!-- Loading State -->
    <div id="loading" class="loading">
        <div style="font-size: 2rem; margin-bottom: 16px;">📰</div>
        <div>Loading today's briefing...</div>
    </div>

    <!-- Main Content (hidden until loaded) -->
    <div id="main-content" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-illustration">
                <img src="trading_desk.jpg" alt="Trading Desk">
            </div>
            <div class="header-content">
                <div class="site-title">MiniMoneyLab</div>
                <h1 class="main-title">Daily Brief</h1>
                <div id="current-date" class="date"></div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stats-inner">
                <div class="stat-item">
                    <div id="stat-total" class="stat-number">0</div>
                    <div class="stat-label">Articles</div>
                </div>
                <div class="stat-item">
                    <div id="stat-high" class="stat-number">0</div>
                    <div class="stat-label">High</div>
                </div>
                <div class="stat-item">
                    <div id="stat-medium" class="stat-number">0</div>
                    <div class="stat-label">Medium</div>
                </div>
                <div class="stat-item">
                    <div id="stat-low" class="stat-number">0</div>
                    <div class="stat-label">Low</div>
                </div>
            </div>
        </div>
        
        <!-- Archive Navigation -->
        <div class="archive-nav">
            <div class="archive-box">
                <div class="archive-title">📅 Past Briefings</div>
                <div id="archive-dates" class="archive-dates"></div>
            </div>
        </div>
        
        <!-- Content Sections -->
        <div class="container">
            <div id="content-sections"></div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-text">
                <span class="footer-brand">MiniMoneyLab</span><br>
                Taiwan Financial Intelligence
            </div>
            <div id="update-time" class="update-time"></div>
        </div>
    </div>

    <script>
        // Current selected date
        let currentDate = new Date().toISOString().split('T')[0];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadAvailableDates();
            loadData(currentDate);
        });
        
        // Load available date buttons (last 7 days)
        function loadAvailableDates() {
            const archiveContainer = document.getElementById('archive-dates');
            const dates = [];
            
            // Generate last 7 days
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                dates.push(dateStr);
            }
            
            // Create buttons
            dates.forEach(dateStr => {
                const button = document.createElement('button');
                button.className = 'date-button';
                if (dateStr === currentDate) {
                    button.classList.add('active');
                }
                
                const date = new Date(dateStr);
                button.textContent = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                button.onclick = () => loadData(dateStr);
                
                archiveContainer.appendChild(button);
            });
        }
        
        // Load data for specific date
        async function loadData(dateStr) {
            try {
                const response = await fetch(`data/${dateStr}.json`);
                
                if (!response.ok) {
                    throw new Error('Data not available');
                }
                
                const data = await response.json();
                renderData(data, dateStr);
                
                // Update active button
                document.querySelectorAll('.date-button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                currentDate = dateStr;
                
            } catch (error) {
                console.log('No data for ' + dateStr);
                // If today's data doesn't exist, that's ok - just show empty
                if (dateStr === new Date().toISOString().split('T')[0]) {
                    document.getElementById('loading').innerHTML = 
                        '<div style="font-size: 2rem; margin-bottom: 16px;">📭</div>' +
                        '<div>No briefing available yet for today.</div>' +
                        '<div style="margin-top: 12px; font-size: 0.875rem;">Try selecting a previous date above.</div>';
                }
            }
        }
        
        // Render data to page
        function renderData(data, dateStr) {
            // Hide loading, show content
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Set date
            const date = new Date(dateStr);
            document.getElementById('current-date').textContent = 
                date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            // Set stats
            document.getElementById('stat-total').textContent = data.total_articles || 0;
            document.getElementById('stat-high').textContent = data.high?.length || 0;
            document.getElementById('stat-medium').textContent = data.medium?.length || 0;
            document.getElementById('stat-low').textContent = data.not_relevant?.length || 0;
            
            // Render sections
            const container = document.getElementById('content-sections');
            container.innerHTML = '';
            
            // High Priority
            if (data.high && data.high.length > 0) {
                container.innerHTML += renderSection('High Priority', 'high', data.high);
            }
            
            // Medium Priority
            if (data.medium && data.medium.length > 0) {
                container.innerHTML += renderSection('Medium Priority', 'medium', data.medium);
            }
            
            // Not Relevant
            if (data.not_relevant && data.not_relevant.length > 0) {
                container.innerHTML += renderNotRelevant(data.not_relevant);
            }
            
            // Update time
            document.getElementById('update-time').textContent = 'Last updated ' + (data.update_time || dateStr);
        }
        
        // Render priority section
        function renderSection(title, priority, articles) {
            let html = `
            <div class="section">
                <div class="section-header">
                    <div class="section-title-wrapper">
                        <div class="priority-indicator ${priority}"></div>
                        <h2 class="section-title">${title}</h2>
                    </div>
                </div>
            `;
            
            articles.forEach(article => {
                html += `
                <article class="article">
                    <h3 class="article-title">${article.title}</h3>
                    <div class="article-meta">
                        <span>📂 ${article.section}</span>
                        <span>📅 ${article.date}</span>
                    </div>
                    <div class="article-summary">${article.summary}</div>
                    <a href="${article.url}" class="article-link" target="_blank" rel="noopener">
                        Read Article →
                    </a>
                </article>
                `;
            });
            
            html += '</div>';
            return html;
        }
        
        // Render not relevant section
        function renderNotRelevant(titles) {
            let html = `
            <div class="section">
                <div class="section-header">
                    <div class="section-title-wrapper">
                        <div class="priority-indicator low"></div>
                        <h2 class="section-title">Not Relevant</h2>
                    </div>
                </div>
                <ul class="not-relevant-list">
            `;
            
            titles.forEach(title => {
                html += `<li>${title}</li>`;
            });
            
            html += '</ul></div>';
            return html;
        }
    </script>
</body>
</html>
